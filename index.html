<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ilza Crochê</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: 'Segoe UI', sans-serif;
}

body{
    background:#f8edf3;
    color:#5a4a4a;
}

.container{
    max-width:900px;
    margin:auto;
    padding:20px;
}

.hero{
    text-align:center;
    padding:40px 20px;
}

.logo{
    width:150px;
    height:150px;
    border-radius:50%;
    object-fit:cover;
    border:5px solid #d85b8f;
    margin-bottom:20px;
}

.profile{
    width:280px;
    max-width:100%;
    border-radius:20px;
    margin:20px auto;
    display:block;
    box-shadow:0 5px 15px rgba(0,0,0,.15);
}

h1{
    color:#d85b8f;
    margin-bottom:10px;
}

.subtitle{
    font-size:1.1rem;
    margin-bottom:30px;
}

.buttons{
    display:flex;
    flex-direction:column;
    gap:15px;
    margin:30px 0;
}

.btn{
    background:#d85b8f;
    color:white;
    text-decoration:none;
    padding:15px;
    border-radius:12px;
    font-weight:bold;
    transition:.3s;
}

.btn:hover{
    background:#c14f7f;
}

.gallery{
    margin-top:50px;
}

.gallery h2{
    text-align:center;
    color:#d85b8f;
    margin-bottom:20px;
}

.gallery-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:15px;
}

.gallery-grid img{
    width:100%;
    border-radius:15px;
    object-fit:cover;
    height:250px;
}

footer{
    text-align:center;
    padding:40px 20px;
    margin-top:50px;
    background:white;
    border-top:2px solid #f0d4df;
}

footer a{
    color:#d85b8f;
    text-decoration:none;
    font-weight:bold;
}

</style>
</head>

<body>

<div class="container">

    <section class="hero">

        <!-- LOGO -->
        <img src="logo.png" alt="Logo Ilza Crochê" class="logo">

        <h1>Ilza Crochê</h1>

        <p class="subtitle">
            Peças artesanais feitas com carinho para deixar seu lar ainda mais especial.
        </p>

        <!-- FOTO DA ARTESÃ -->
        <img src="artesa.jpg" alt="Ilza Crochê" class="profile">

        <div class="buttons">

            <a class="btn"
               href="https://wa.me/5577988659901"
               target="_blank">
               📱 Fazer Pedido pelo WhatsApp
            </a>

            <a class="btn"
               href="https://instagram.com/ilzacroche"
               target="_blank">
               📸 Instagram
            </a>

            <a class="btn"
               href="#galeria">
               🧶 Catálogo
            </a>

            <a class="btn"
               href="https://wa.me/5577988659901"
               target="_blank">
               ❤️ Solicitar Orçamento
            </a>

        </div>

    </section>

    <section class="gallery" id="galeria">

        <h2>Galeria de Trabalhos</h2>

        <div class="gallery-grid">

            <img src="produto1.jpg" alt="Crochê">
            <img src="produto2.jpg" alt="Crochê">
            <img src="produto3.jpg" alt="Crochê">
            <img src="produto4.jpg" alt="Crochê">
            <img src="produto5.jpg" alt="Crochê">
            <img src="produto6.jpg" alt="Crochê">

        </div>

    </section>

</div>

<footer>

    <p>
        📸 Instagram:
        <a href="https://instagram.com/ilzacroche" target="_blank">
            @ilzacroche
        </a>
    </p>

    <br>

    <p>
        📱 WhatsApp:
        <a href="https://wa.me/5577988659901" target="_blank">
            (77) 98865-9901
        </a>
    </p>

    <br>

    <p>
        © 2026 Ilza Crochê • Feito com carinho
    </p>

</footer>

</body>
</html>
